<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bukidnon Editable Website</title>  <style>
    body { font-family: Arial, sans-serif; margin: 0; background-color: #fffdf0; }
    header { background-color: #FFD700; color: #2d5a27; padding: 20px; text-align: center; }
    nav { background: #222; padding: 10px; text-align: center; }
    nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
    .hero { height: 250px; background: #2E7D32; color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
    .section { padding: 30px; text-align: center; }
    .editable { border: 2px dashed transparent; padding: 5px; }
    .editable:focus { outline: none; border-color: #FFD700; background: #fff8cc; }
    .btn { background: #2E7D32; color: white; border: none; padding: 10px 20px; cursor: pointer; margin: 10px; }
    .btn:hover { opacity: 0.8; }
  </style></head><body><header>
  <h1 contenteditable="true" class="editable" id="title">BUKIDNON: THE GOLDEN LAND</h1>
  <p contenteditable="true" class="editable" id="subtitle">Click here to edit subtitle</p>
</header><nav>
  <a href="#">Home</a>
  <a href="#">Heritage</a>
  <a href="#">Industry</a>
  <a href="#">Events</a>
</nav><div class="hero">
  <h2 contenteditable="true" class="editable" id="heroText">Click to edit hero text</h2>
</div><div class="section">
  <h2 contenteditable="true" class="editable" id="aboutTitle">About Bukidnon</h2>
  <p contenteditable="true" class="editable" id="aboutText">
    Click here to edit description about Bukidnon.
  </p>
</div><div class="section">
  <button class="btn" onclick="saveContent()">Save</button>
  <button class="btn" onclick="loadContent()">Load</button>
  <button class="btn" onclick="clearContent()">Reset</button>
</div><script>
  function saveContent() {
    localStorage.setItem('title', document.getElementById('title').innerHTML);
    localStorage.setItem('subtitle', document.getElementById('subtitle').innerHTML);
    localStorage.setItem('heroText', document.getElementById('heroText').innerHTML);
    localStorage.setItem('aboutTitle', document.getElementById('aboutTitle').innerHTML);
    localStorage.setItem('aboutText', document.getElementById('aboutText').innerHTML);
    alert('Content Saved!');
  }

  function loadContent() {
    document.getElementById('title').innerHTML = localStorage.getItem('title') || '';
    document.getElementById('subtitle').innerHTML = localStorage.getItem('subtitle') || '';
    document.getElementById('heroText').innerHTML = localStorage.getItem('heroText') || '';
    document.getElementById('aboutTitle').innerHTML = localStorage.getItem('aboutTitle') || '';
    document.getElementById('aboutText').innerHTML = localStorage.getItem('aboutText') || '';
  }

  function clearContent() {
    localStorage.clear();
    location.reload();
  }

  window.onload = loadContent;
</script></body>
  </html>
